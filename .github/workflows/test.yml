name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The root main package embeds frontend/dist via //go:embed; the committed
      # frontend/dist/gitkeep satisfies it, so no frontend build is needed here.
      - run: go build ./...
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Test (JUnit output)
        run: gotestsum --junitfile go-results.xml --format pkgname -- ./...
      - name: Upload Go test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-results
          path: go-results.xml

  frontend:
    name: Frontend (test + check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Test (JUnit output)
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=vitest-results.xml
      - name: Type-check
        run: npm run check
      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-results
          path: frontend/vitest-results.xml

  report:
    name: Test results
    runs-on: ubuntu-latest
    needs: [go, frontend]
    if: always()
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: results
      - name: Publish test results as a PR comment
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: results/**/*.xml
          comment_mode: always
          check_name: Test results
