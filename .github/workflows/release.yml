name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  macos:
    name: Build & release (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build (darwin/arm64)
        run: wails build -platform darwin/arm64
      - name: Package .app bundle as a zip
        run: |
          cd build/bin
          ditto -c -k --keepParent trace-go.app "trace-go-${GITHUB_REF_NAME}-darwin-arm64.zip"
      - name: Create GitHub Release and attach the build
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*.zip
          generate_release_notes: true
          # Unsigned/un-notarized build: macOS Gatekeeper flags it on first open.
          body: |
            macOS (Apple Silicon) build. The app is **not code-signed or notarized**,
            so on first launch macOS shows an "unidentified developer" warning —
            right-click the app and choose **Open** to run it.
