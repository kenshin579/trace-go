<h2>A + C 결합안 — 이렇게?</h2>
<p class="subtitle">빛 점이 G1 → G2로 이동(원인)하고, 도착하는 순간 G2에서 링이 퍼짐(결과 = 깨어남). 엣지 전체 점멸은 생략.</p>

<div class="mockup">
  <div class="mockup-header">이동 입자 + 도착 링</div>
  <div class="mockup-body" style="background:#0f1117;padding:20px;">
    <svg viewBox="0 0 360 140" width="100%" height="180">
      <line x1="70" y1="70" x2="290" y2="70" stroke="#2a2e38" stroke-width="2"/>

      <!-- nodes -->
      <circle cx="70" cy="70" r="15" fill="#4caf50"/>
      <text x="70" y="74" fill="#0f1117" font-size="10" text-anchor="middle">G1</text>

      <!-- G2: turns from red to green right as the ring fires -->
      <circle cx="290" cy="70" r="15" fill="#c25450">
        <animate attributeName="fill" values="#c25450;#c25450;#4caf50;#4caf50" keyTimes="0;0.75;0.8;1" dur="0.6s" begin="0s;p.end+0.8s"/>
      </circle>
      <text x="290" y="74" fill="#fff" font-size="10" text-anchor="middle">G2</text>

      <!-- traveling particle (A) -->
      <circle r="6" fill="#5b8def">
        <animate attributeName="cx" values="70;290" dur="0.6s" begin="0s;p.end+0.8s" id="p"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="0.6s" begin="0s;p.end+0.8s"/>
      </circle>

      <!-- arrival ring at G2 (C), fires near the end of the particle travel -->
      <circle cx="290" cy="70" fill="none" stroke="#5b8def" stroke-width="2.5">
        <animate attributeName="r" values="15;34" dur="0.45s" begin="0.45s;p.end+1.25s"/>
        <animate attributeName="opacity" values="0.9;0" dur="0.45s" begin="0.45s;p.end+1.25s"/>
      </circle>

      <text x="180" y="120" fill="#8a93a3" font-size="10" text-anchor="middle">입자 도착 → 링 확산 + G2가 빨강→초록(깨어남)</text>
    </svg>
  </div>
</div>

<div class="options">
  <div class="option" data-choice="yes" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content"><h3>좋다, 이걸로</h3><p>이동 입자 + 도착 링 결합</p></div>
  </div>
  <div class="option" data-choice="tweak" onclick="toggleSelect(this)">
    <div class="letter">~</div>
    <div class="content"><h3>방향은 맞는데 조정 필요</h3><p>예: 링만/입자만 더 강조, 속도, 엣지도 살짝 밝게 등</p></div>
  </div>
</div>
