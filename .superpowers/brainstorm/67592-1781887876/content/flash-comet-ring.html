<h2>코멧(꼬리 입자) + 도착 링</h2>
<p class="subtitle">꼬리 달린 빛 입자가 엣지를 타고 G1 → G2로 흐르고, 도착 순간 G2에서 링이 퍼짐(깨어남).</p>

<div class="mockup">
  <div class="mockup-header">엣지 위 코멧 + 도착 링</div>
  <div class="mockup-body" style="background:#0f1117;padding:20px;">
    <svg viewBox="0 0 360 140" width="100%" height="180">
      <line x1="70" y1="70" x2="290" y2="70" stroke="#2a2e38" stroke-width="2"/>

      <circle cx="70" cy="70" r="15" fill="#4caf50"/>
      <text x="70" y="74" fill="#0f1117" font-size="10" text-anchor="middle">G1</text>

      <circle cx="290" cy="70" r="15" fill="#c25450">
        <animate attributeName="fill" values="#c25450;#c25450;#4caf50;#4caf50" keyTimes="0;0.75;0.8;1" dur="0.6s" begin="0s;p.end+0.8s"/>
      </circle>
      <text x="290" y="74" fill="#fff" font-size="10" text-anchor="middle">G2</text>

      <!-- comet tail: 2 trailing dots (behind the lead) + lead dot, all on the edge (cy=70) -->
      <circle cy="70" r="3" fill="#5b8def" opacity="0.3">
        <animate attributeName="cx" values="40;260" dur="0.6s" begin="0s;p.end+0.8s"/>
        <animate attributeName="opacity" values="0;0.3;0.3;0" keyTimes="0;0.15;0.85;1" dur="0.6s" begin="0s;p.end+0.8s"/>
      </circle>
      <circle cy="70" r="4.5" fill="#5b8def" opacity="0.6">
        <animate attributeName="cx" values="55;275" dur="0.6s" begin="0s;p.end+0.8s"/>
        <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.12;0.85;1" dur="0.6s" begin="0s;p.end+0.8s"/>
      </circle>
      <circle cy="70" r="6.5" fill="#7aa7f5">
        <animate attributeName="cx" values="70;290" dur="0.6s" begin="0s;p.end+0.8s" id="p"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="0.6s" begin="0s;p.end+0.8s"/>
      </circle>

      <!-- arrival ring -->
      <circle cx="290" cy="70" fill="none" stroke="#5b8def" stroke-width="2.5">
        <animate attributeName="r" values="15;34" dur="0.45s" begin="0.45s;p.end+1.25s"/>
        <animate attributeName="opacity" values="0.9;0" dur="0.45s" begin="0.45s;p.end+1.25s"/>
      </circle>

      <text x="180" y="120" fill="#8a93a3" font-size="10" text-anchor="middle">꼬리 입자가 엣지를 타고 흐름 → 도착 시 링 + G2 빨강→초록</text>
    </svg>
  </div>
</div>

<div class="options">
  <div class="option" data-choice="comet-ring" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content"><h3>좋다 — 코멧 + 링</h3><p>꼬리 입자 + 도착 링</p></div>
  </div>
  <div class="option" data-choice="plain-ring" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content"><h3>꼬리 빼고 단일 입자 + 링</h3><p>더 깔끔한 쪽</p></div>
  </div>
</div>
